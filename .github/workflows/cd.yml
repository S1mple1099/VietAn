# =============================================================================
# CD - Deploy to Kubernetes after CI success (self-hosted runner)
# =============================================================================
# Triggers: workflow_run of CI on success
# Runner: self-hosted (EC2) with kubectl + kubeconfig đã cấu hình sẵn (~/.kube/config)
# Secrets: DOCKER_USERNAME (for image reference)
# =============================================================================
name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Kubernetes
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply manifests
        run: |
          export IMAGE=${{ secrets.DOCKER_USERNAME }}/monitoring-api:${{ github.event.workflow_run.head_sha }}
          # Substitute image in deployment
          sed -i "s|DOCKERHUB_USER/monitoring-api:latest|${IMAGE}|g" k8s/deployment.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/deployment.yaml

      - name: Rollout status
        run: |
          # Chờ tối đa 2 phút, nếu không sẵn sàng thì in diagnostic rồi fail
          set -e
          if ! kubectl rollout status deployment/monitoring-api -n default --timeout=120s; then
            echo "Deployment not ready after 120s. Dumping diagnostics..."
            kubectl get pods -n default -o wide
            kubectl describe deployment/monitoring-api -n default || true
            kubectl describe pods -n default | sed -n '1,300p' || true
            exit 1
          fi
