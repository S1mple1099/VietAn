# =============================================================================
# CD - Deploy to Kubernetes after CI success
# =============================================================================
# Triggers: workflow_run of CI on success
# Secrets: KUBECONFIG (base64-encoded kubeconfig for cluster access)
#          DOCKER_USERNAME (for image reference)
# =============================================================================
name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Apply manifests
        run: |
          export IMAGE=${{ secrets.DOCKER_USERNAME }}/monitoring-api:${{ github.event.workflow_run.head_sha }}
          # Substitute image in deployment
          sed -i "s|DOCKERHUB_USER/monitoring-api:latest|${IMAGE}|g" k8s/deployment.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/deployment.yaml

      - name: Rollout status
        run: |
          kubectl rollout status deployment/monitoring-api -n default --timeout=300s
