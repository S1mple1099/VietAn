# =============================================================================
# CI - Build, Test, Docker build & push (no deploy)
# =============================================================================
# Triggers: push to main
# Secrets: DOCKER_USERNAME, DOCKER_PASSWORD
# =============================================================================
name: CI

on:
  push:
    branches:
      - main

env:
  DOTNET_VERSION: "8.0"
  DOCKER_IMAGE: monitoring-api

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore MonitoringSystem.sln

      - name: Build
        run: dotnet build MonitoringSystem.sln -c Release --no-restore

      - name: Test
        run: dotnet test MonitoringSystem.sln -c Release --no-build --verbosity normal

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
