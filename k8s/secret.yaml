# =============================================================================
# Secret - Sensitive data (connection string, JWT key)
# =============================================================================
# IMPORTANT: Replace placeholder values before applying.
# Generate base64: echo -n 'Data Source=/data/app.db' | base64
#
# Production: use external secrets (Sealed Secrets, Vault, etc.)
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: monitoring-secret
  labels:
    app: monitoring-api
type: Opaque
stringData:
  # Use stringData for plain text - K8s encodes automatically
  # Override with real values via CI/CD or sealed-secrets
  ConnectionStrings__DefaultConnection: "Data Source=/data/app.db"
  Jwt__Key: "CHANGE-ME-use-32-byte-secret-for-production"
